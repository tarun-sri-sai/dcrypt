<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'unsafe-inline' 'unsafe-eval' vscode-webview-resource:; style-src 'unsafe-inline' vscode-webview-resource:;"
    />
    <title>DCrypt Editor</title>
    <script>
      const vscode = acquireVsCodeApi();
      window.addEventListener("load", () => {
        vscode.postMessage({ command: "ready" });
      });
      window.addEventListener("message", (event) => {
        const message = event.data;
        switch (message.command) {
          case "setContent":
            document.getElementById("editor").value = message.content;
            break;
        }
      });
      function onInput() {
        vscode.postMessage({
          command: "save",
          text: document.getElementById("editor").value,
        });
      }
    </script>
    <style>
      body {
        padding: 0;
        margin: 0;
      }
      #editor {
        width: 100%;
        height: 100vh;
        border: none;
        padding: 8px;
        resize: none;
        font-family: var(--vscode-editor-font-family);
        font-size: var(--vscode-editor-font-size);
        background: var(--vscode-editor-background);
        color: var(--vscode-editor-foreground);
      }
      #editor:focus {
        outline: none;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <textarea id="editor" spellcheck="false" onInput="onInput()"></textarea>
  </body>
</html>
